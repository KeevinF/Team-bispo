<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerenciar Transformações</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 30px;
            background: #111;
            border-radius: 20px;
            color: white;
        }

        .admin-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #d8a233;
        }

        .upload-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #050505;
            border-radius: 10px;
            border: 2px dashed #d8a233;
        }

        .upload-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #d8a233;
        }

        .upload-section input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }

        .upload-section button {
            width: 100%;
            padding: 12px;
            background: #d8a233;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .upload-section button:hover {
            opacity: 0.8;
        }

        .fotos-list {
            margin-top: 30px;
        }

        .fotos-list h2 {
            color: #d8a233;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .foto-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .foto-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #111;
            border-radius: 5px;
            padding: 5px;
        }

        .foto-info {
            flex: 1;
        }

        .foto-info p {
            margin: 0;
            font-size: 12px;
            color: #999;
        }

        .foto-remove {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .foto-remove:hover {
            background: #b71c1c;
        }

        .voltar {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            transition: 0.3s;
        }

        .voltar:hover {
            background: #888;
        }

        .mensagem {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .mensagem.sucesso {
            background: #4caf50;
            color: white;
        }

        .mensagem.erro {
            background: #f44336;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 0 15px;
        }
    </style>
</head>

<body style="background: #050505;">

    <div class="container">
        <div class="admin-container">
            <h1>📸 Gerenciar Transformações</h1>

            <div id="mensagem"></div>

            <div class="upload-section">
                <label for="fotoInput">📁 Selecione uma foto para adicionar:</label>
                <input type="file" id="fotoInput" accept="image/*">
                <button onclick="adicionarFoto()">Adicionar Foto</button>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">
                    ✓ Formatos aceitos: JPG, PNG, GIF, WebP<br>
                    ✓ Tamanho máximo: 5MB
                </p>
            </div>

            <div class="fotos-list">
                <h2>Fotos Atuais:</h2>
                <div id="fotosList"></div>
                <p id="vazio" style="text-align: center; color: #999; padding: 20px;">
                    Nenhuma foto adicionada ainda. Comece adicionando uma! 📷
                </p>
            </div>

            <a href="../index.html" class="voltar">← Voltar ao Site</a>
        </div>
    </div>

    <script>
        // Carregar fotos ao abrir a página
        document.addEventListener("DOMContentLoaded", carregarFotos);

        function adicionarFoto() {
            const input = document.getElementById("fotoInput");
            const file = input.files[0];

            if (!file) {
                mostrarMensagem("Por favor, selecione uma foto", "erro");
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                mostrarMensagem("Arquivo muito grande! Máximo 5MB", "erro");
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                let fotos = JSON.parse(localStorage.getItem("transformacoes")) || [];

                fotos.push({
                    id: Date.now(),
                    data: e.target.result,
                    nome: file.name
                });

                localStorage.setItem("transformacoes", JSON.stringify(fotos));
                mostrarMensagem("✓ Foto adicionada com sucesso!", "sucesso");

                input.value = "";
                carregarFotos();
            };
            reader.readAsDataURL(file);
        }

        function removerFoto(id) {
            if (confirm("Tem certeza que deseja remover esta foto?")) {
                let fotos = JSON.parse(localStorage.getItem("transformacoes")) || [];
                fotos = fotos.filter(f => f.id !== id);

                localStorage.setItem("transformacoes", JSON.stringify(fotos));
                mostrarMensagem("✓ Foto removida!", "sucesso");
                carregarFotos();
            }
        }

        function carregarFotos() {
            let fotos = JSON.parse(localStorage.getItem("transformacoes")) || [];
            const lista = document.getElementById("fotosList");
            const vazio = document.getElementById("vazio");

            lista.innerHTML = "";

            if (fotos.length === 0) {
                vazio.style.display = "block";
                return;
            }

            vazio.style.display = "none";

            fotos.forEach((foto, index) => {
                const item = document.createElement("div");
                item.className = "foto-item";
                item.innerHTML = `
                    <img src="${foto.data}" alt="Foto ${index + 1}">
                    <div class="foto-info">
                        <strong>Foto ${index + 1}</strong>
                        <p>${foto.nome}</p>
                    </div>
                    <button class="foto-remove" onclick="removerFoto(${foto.id})">Remover</button>
                `;
                lista.appendChild(item);
            });
        }

        function mostrarMensagem(texto, tipo) {
            const div = document.getElementById("mensagem");
            div.textContent = texto;
            div.className = "mensagem " + tipo;

            setTimeout(() => {
                div.innerHTML = "";
            }, 3000);
        }
    </script>

</body>

</html>
